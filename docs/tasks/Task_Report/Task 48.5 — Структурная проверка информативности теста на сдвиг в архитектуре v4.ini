# Task 48.5 — Структурная проверка информативности ∆V5/MT в архитектуре v4
## Внутриполушарный и межполушарный анализ с учётом ограничений старой декомпозиции

**Версия:** v1  
**Статус:** Draft — Approval Required  
**Язык итогового документа:** Русский  

---

# 1. Основание

В предыдущих агрегированных анализах возник вывод о том, что тест движения (∆V5/MT) не вносит значимого вклада в суммарную модель.

Этот вывод вызывает сомнение, поскольку:

- численно различия между ∆V4 и ∆V5/MT выражены;
- нейрофизиологически это разные каналы;
- Magno и Parvo имеют различное нейромедиаторное обеспечение;
- декомпозиция v4 основана на логике вычитания, потенциально смешивающей пути.

Прямое сравнение каналов может быть преждевременным,
так как старая архитектура не обеспечивает чистой изоляции V4 и V5.

Следовательно, прежде чем делать вывод о «малоинформативности» Magno-теста,
необходимо провести структурную проверку корректности самой декомпозиции.

---

# 2. Цель Task 48.5

1. Проверить, действительно ли ∆V5/MT малоинформативен.
2. Определить, не является ли этот вывод следствием архитектурных ограничений v4.
3. Выполнить строгий внутриполушарный и межполушарный анализ.
4. Оценить степень корреляционного перекрытия ∆V4 и ∆V5.
5. Определить, является ли Magno тест статистически редуцируемым или независимым.

---

# 3. Этап I — Проверка корректности декомпозиции

## 3.1 Архитектурная ревизия

1. Документировать формулу вычисления:
   - ∆V4
   - ∆V5/MT
2. Определить:
   - какие компоненты V1 остаются в ∆V5;
   - степень математического пересечения ∆V4 и ∆V5.
3. Проверить:
   - корреляцию ∆V4 и ∆V5 на уровне всей выборки;
   - variance overlap (% общей дисперсии).

Если корреляция высокая (>0.6–0.7), вывод о «слабом вкладе» может быть следствием редундантной декомпозиции.

---

# 4. Этап II — Внутриполушарный анализ

Для каждого субъекта:

## 4.1 Левое поле
Сравнить:
- ∆V4_L
- ∆V5_L

Проверить:
- среднюю разницу;
- стандартное отклонение;
- paired t-test;
- Cohen’s d;
- корреляцию.

## 4.2 Правое поле
Аналогично:
- ∆V4_R
- ∆V5_R

---

# 5. Этап III — Межполушарная асимметрия

Вычислить:

AI_V4 = ∆V4_L − ∆V4_R  
AI_V5 = ∆V5_L − ∆V5_R  

Проверить:

1. Корреляцию AI_V4 и AI_V5.
2. Различие распределений (KS-test).
3. Наличие субъектов с противоположной асимметрией:
   - AI_V4 > 0, AI_V5 < 0 и наоборот.
4. Распределение знаков асимметрии.

Цель:
Определить, отражают ли каналы независимую латерализационную динамику.

---

# 6. Этап IV — Проверка «малоинформативности»

Проверить:

1. Partial R² ∆V5 в модели без ∆V4.
2. Partial R² ∆V4 в модели без ∆V5.
3. Изменение AIC при включении каждого канала по отдельности.
4. Уменьшается ли объяснённая дисперсия при исключении ∆V5?

Важно:
Сравнение проводить корректно (одинаковые данные).

---

# 7. Этап V — Проверка устойчивости на микроуровне

1. Сравнить:
   - slope_F1_V4 vs slope_F1_V5
   - slope_F2_V4 vs slope_F2_V5
2. Проверить:
   - различие FAR (Fatigue Amplification Ratio).
3. Проверить:
   - различие PSI-чувствительности.

Если Magno демонстрирует иной профиль динамики, его нельзя считать редуцируемым.

---

# 8. Ограничения анализа

1. Декомпозиция v4 может быть неполной.
2. ∆V5 может содержать остаточный вклад V1.
3. Вычитательная логика может создавать математическую зависимость.

В отчёте необходимо явно указать, что сравнение проводится в рамках ограничений v4.

